name: Repository Settings

on:
  workflow_dispatch:

jobs:
  settings:
    runs-on: ubuntu-latest
    steps:
      - name: Update repository description
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: '⚡ OpenClaw Token Optimizer - 非程序员友好版，纯 prompt 层面优化，任何部署都能用',
              homepage: 'https://github.com/Liman-fully/token-optimizer',
              topics: ['openclaw', 'token-optimization', 'skill', 'ai', 'cost-saving']
            })
